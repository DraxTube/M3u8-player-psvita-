name: Build PS Vita M3U8 Player

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate LiveArea assets
        run: |
          pip3 install Pillow
          python3 -c "
          from PIL import Image, ImageDraw
          import os
          os.makedirs('sce_sys/livearea/contents', exist_ok=True)
          def save8bit(img, path):
              img.convert('P', palette=Image.ADAPTIVE, colors=256).save(path)
          img = Image.new('RGB', (128, 128), (18, 18, 40))
          d = ImageDraw.Draw(img)
          d.polygon([(45,30),(45,98),(100,64)], fill=(0,120,215))
          save8bit(img, 'sce_sys/icon0.png')
          img = Image.new('RGB', (840, 500), (12, 12, 30))
          d = ImageDraw.Draw(img)
          d.polygon([(370,180),(370,320),(480,250)], fill=(0,100,200))
          save8bit(img, 'sce_sys/livearea/contents/bg.png')
          img = Image.new('RGB', (280, 158), (18, 18, 40))
          d = ImageDraw.Draw(img)
          d.polygon([(115,40),(115,118),(175,79)], fill=(0,120,215))
          save8bit(img, 'sce_sys/livearea/contents/startup.png')
          print('8-bit PNG assets generated OK')
          "

      - name: Build with VitaSDK
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            -w /src \
            vitasdk/vitasdk:latest \
            bash -c "ls -la sce_sys/icon0.png sce_sys/livearea/contents/ && mkdir -p build && cd build && cmake .. -DCMAKE_TOOLCHAIN_FILE=\$VITASDK/share/vita.toolchain.cmake && make -j\$(nproc) && ls -la m3u8player.vpk && echo 'VPK built successfully'"

      - name: Upload VPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: m3u8player.vpk
          path: build/m3u8player.vpk
          if-no-files-found: error
